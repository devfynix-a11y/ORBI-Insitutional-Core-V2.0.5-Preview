global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'orbi-cluster-monitor'

# Load rules once and periodically evaluate them according to the global 'evaluation_interval'.
rule_files:
  # - "first_rules.yml"
  # - "second_rules.yml"

# A scrape configuration containing exactly one endpoint to scrape:
# Here it's Prometheus itself.
scrape_configs:
  # The job name is added as a label `job=<job_name>` to any timeseries scraped from this config.
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # NEW: Redis Exporter Scrape Job
  - job_name: 'redis-exporter'
    static_configs:
      - targets: ['redis-exporter:9121']
    relabel_configs:
      - target_label: instance
        replacement: 'orbi-redis-primary'
      - source_labels: [__address__]
        separator: ;
        regex: (.*)
        target_label: __address__
        replacement: ${1}
        action: replace

  # Integration for Orbi Node Metrics (Optional but recommended for the ecosystem)
  - job_name: 'orbi-core-node'
    metrics_path: '/sys/status'
    static_configs:
      - targets: ['localhost:3002']
