# ORBI SOVEREIGN REDIS CONFIGURATION (V1.2 Titanium)
# Optimized for Banking-Grade Sovereign Clusters

# --- Network & Connectivity ---
port 0
tls-port 6379
tls-protocols TLSv1.3
tls-cert-file /etc/redis/tls/redis.crt
tls-key-file /etc/redis/tls/redis.key
tls-ca-cert-file /etc/redis/tls/ca.crt
tls-auth-clients yes
tls-replication yes
tls-cluster yes

# Performance Tuning
tcp-backlog 511
timeout 0
tcp-keepalive 300

# --- Security ---
protected-mode yes
aclfile /etc/redis/users.acl

# Command Obfuscation (Defense-in-Depth)
rename-command FLUSHALL "ORBI_FLUSH_FORCE_99"
rename-command FLUSHDB "ORBI_FLUSH_NODE_99"
rename-command CONFIG "ORBI_SYS_CONFIG_99"
rename-command SHUTDOWN "ORBI_TERMINATE_NODE_99"

# --- Resource Management ---
# Limit memory to 75% of available pod RAM
maxmemory 2gb
maxmemory-policy volatile-lru
maxmemory-samples 5

# --- Persistence ---
appendonly yes
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# --- Cluster Management ---
cluster-enabled yes
cluster-config-file nodes.conf
cluster-node-timeout 5000
cluster-require-full-coverage no
cluster-migration-barrier 1

# --- Monitoring ---
slowlog-log-slower-than 10000
slowlog-max-len 128
latency-monitor-threshold 100
